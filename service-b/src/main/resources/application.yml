server:
  port: 8081

spring:
  application:
    name: service-b
  datasource:
    url: jdbc:postgresql://localhost:5432/service_b
    username: ndtdoanh
    password: 12345678
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: service-b-activity
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: com.demo.serviceb.ingest.model
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.demo.serviceb.ingest.model.DomainChangeEvent

app:
  kafka:
    product-updates-topic: product.updates

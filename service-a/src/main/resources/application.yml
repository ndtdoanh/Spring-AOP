server:
  port: 8080

spring:
  application:
    name: service-a
  datasource:
    url: jdbc:postgresql://localhost:5432/service_a
    username: postgres
    password: ndtdoanh
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
